<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✍️ AI 숫자 판독기 (MNIST)</title>
    <!-- 🧠 TensorFlow.js 라이브러리 불러오기 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 320px;
        }
        h2 { color: #333; margin-top: 0; }
        
        /* 그림을 그릴 캔버스 */
        #canvas {
            border: 3px solid #333;
            border-radius: 8px;
            background-color: white;
            cursor: crosshair;
            touch-action: none; /* 스마트폰 터치 스크롤 방지 */
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-clear { background-color: #ff4757; color: white; }
        .btn-predict { background-color: #2ed573; color: white; }
        button:hover { opacity: 0.9; }
        
        #result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #007bff;
            min-height: 35px;
        }
        .loading { color: #ffa502; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>✍️ 숫자 판독기</h2>
    <div id="status" class="loading">AI 모델을 불러오는 중입니다... ⏳</div>
    
    <!-- 280x280 사이즈의 캔버스 (내부적으로 28x28로 축소해서 AI에게 줌) -->
    <canvas id="canvas" width="280" height="280"></canvas>
    
    <div class="btn-group">
        <button class="btn-clear" onclick="clearCanvas()">지우기</button>
        <button class="btn-predict" onclick="predictDigit()">판독하기</button>
    </div>
    
    <div id="result">여기에 결과가 나옵니다</div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    let model;

    // 1. 브라우저가 열리면 AI 모델 로드하기
    async function loadModel() {
        try {
            // 구글에서 호스팅하는 퍼블릭 MNIST 사전 학습 모델 로드
            model = await tf.loadLayersModel('https://storage.googleapis.com/tfjs-models/tfjs/mnist_transfer_cnn_v1/model.json');
            document.getElementById('status').innerText = "✨ 모델 로드 완료! 숫자를 그려보세요.";
            document.getElementById('status').style.color = "#2ed573";
        } catch (error) {
            console.error(error);
            document.getElementById('status').innerText = "⚠️ 모델 로드 실패. (네트워크 확인)";
        }
    }
    loadModel();

    // 2. 캔버스 그림 그리기 설정 (마우스 & 터치)
    ctx.lineWidth = 18;
    ctx.lineCap = 'round';
    ctx.strokeStyle = 'black';

    function startPosition(e) {
        isDrawing = true;
        draw(e);
    }

    function endPosition() {
        isDrawing = false;
        ctx.beginPath();
    }

    function draw(e) {
        if (!isDrawing) return;
        
        // 마우스 및 터치 좌표 보정
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        
        const x = clientX - rect.left;
        const y = clientY - rect.top;

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
        
        e.preventDefault(); // 스마트폰 화면 스크롤 방지
    }

    canvas.addEventListener('mousedown', startPosition);
    canvas.addEventListener('mouseup', endPosition);
    canvas.addEventListener('mousemove', draw);
    
    canvas.addEventListener('touchstart', startPosition);
    canvas.addEventListener('touchend', endPosition);
    canvas.addEventListener('touchmove', draw);

    // 3. 캔버스 초기화 함수
    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.getElementById('result').innerText = "여기에 결과가 나옵니다";
    }

    // 4. 대망의 AI 판독 함수
    async function predictDigit() {
        if (!model) {
            alert("AI 모델이 아직 로드되지 않았습니다. 잠시만 기다려주세요!");
            return;
        }

        // 화면에 그린 280x280 이미지를 AI가 먹을 수 있게 28x28 크기로 축소
        const offScreenCanvas = document.createElement('canvas');
        offScreenCanvas.width = 28;
        offScreenCanvas.height = 28;
        const offCtx = offScreenCanvas.getContext('2d');
        
        // 하얀 배경 깔아주기 (투명도 방지)
        offCtx.fillStyle = 'white';
        offCtx.fillRect(0, 0, 28, 28);
        offCtx.drawImage(canvas, 0, 0, 28, 28);

        // 픽셀 데이터 가져오기 (28 * 28 = 784 픽셀)
        const imageData = offCtx.getImageData(0, 0, 28, 28).data;
        const grayscaleData = new Float32Array(28 * 28);

        // 이미지 전처리 (흑백 전환 및 정규화)
        // MNIST 모델은 배경이 검은색(0), 글씨가 흰색(1)인 데이터를 학습했음!
        // 우리가 그린 건 하얀 배경에 검은 글씨이므로 색상을 반전시켜줌 (255 - 픽셀값)
        for (let i = 0; i < imageData.length; i += 4) {
            // (R + G + B) / 3 으로 흑백 값 구하기
            let avg = (imageData[i] + imageData[i + 1] + imageData[i + 2]) / 3; 
            let inverted = 255 - avg; // 색상 반전
            grayscaleData[i / 4] = inverted / 255.0; // 0 ~ 1 사이로 정규화
        }

        // 데이터를 텐서(Tensor)로 변환: 형태 [1, 28, 28, 1] (배치크기, 가로, 세로, 채널)
        const tensor = tf.tensor4d(grayscaleData, [1, 28, 28, 1]);

        // 예측 실행
        const prediction = model.predict(tensor);
        const result = await prediction.data(); // 0~9까지의 확률 배열 리턴
        
        // 가장 확률이 높은 숫자(인덱스) 찾기
        const predictedNumber = result.indexOf(Math.max(...result));
        const confidence = Math.round(Math.max(...result) * 100);

        document.getElementById('result').innerHTML = `판독 결과: <span>${predictedNumber}</span> (${confidence}% 확신)`;
    }
</script>

</body>
</html>
