<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔊 고품질 웹 TTS 엔진</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a24;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #252532;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            text-align: center;
            width: 350px;
        }
        h2 { color: #00d2ff; margin-top: 0; }
        textarea {
            width: calc(100% - 24px);
            height: 100px;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #00d2ff;
            background-color: #111;
            color: white;
            font-size: 16px;
            resize: none;
            margin-bottom: 15px;
        }
        .control-group {
            margin-bottom: 15px;
            text-align: left;
            font-size: 14px;
        }
        label { display: inline-block; width: 60px; color: #aaa; }
        input[type="range"] { width: 230px; vertical-align: middle; }
        
        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #2ed573;
            color: white;
            transition: 0.2s;
        }
        button:hover { opacity: 0.9; transform: scale(0.98); }
        .status { color: #ffa502; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔊 웹 고품질 TTS</h2>
    <textarea id="text-input">안녕하세요. 아두이노 오토 도어 브이투 시스템이 정상적으로 가동되었습니다.</textarea>
    
    <!-- 속도 및 피치 조절바 -->
    <div class="control-group">
        <label>속도(Speed)</label>
        <input type="range" id="rate" min="0.5" max="2" value="1" step="0.1">
    </div>
    <div class="control-group">
        <label>음높이(Pitch)</label>
        <input type="range" id="pitch" min="0.5" max="2" value="1.1" step="0.1"> <!-- 1.1로 주면 약간 더 산뜻한 목소리가 납니다 -->
    </div>

    <button onclick="speakText()">🎙️ 목소리 출력하기</button>
    <div id="status" class="status">브라우저 내장 고품질 음성 엔진 대기 중</div>
</div>

<script>
    let voices = [];

    // 브라우저에 로드된 부드러운 한국어 목소리 엔진 찾기
    function setVoiceEngine() {
        // 브라우저 내장 음성 리스트 업
        voices = window.speechSynthesis.getVoices();
        if(voices.length > 0) {
            document.getElementById('status').innerText = "🟢 고품질 음성 엔진 준비 완료";
        }
    }

    // 크롬 등 일부 브라우저에서는 오디오 엔진 로드가 비동기라 이 이벤트가 필요함
    if (window.speechSynthesis.onvoiceschanged !== undefined) {
        window.speechSynthesis.onvoiceschanged = setVoiceEngine;
    }

    function speakText() {
        const text = document.getElementById('text-input').value.trim();
        if (!text) return alert("말할 내용을 입력하세요!");

        // 현재 읽고 있는 게 있다면 멈추기
        window.speechSynthesis.cancel();

        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'ko-KR'; // 한국어 설정

        // 슬라이더 값 반영
        speech.rate = document.getElementById('rate').value;   // 속도
        speech.pitch = document.getElementById('pitch').value; // 음높이

        // 💡 [핵심] 가장 기계음 같지 않고 부드러운 '구글 한국어' 또는 시스템 내장 고품질 엔진 선별하기
        const selectedVoice = voices.find(voice => 
            voice.lang.includes('ko') && 
            (voice.name.includes('Google') || voice.name.includes('Natural') || voice.name.includes('Premium'))
        ) || voices.find(voice => voice.lang.includes('ko')); // 없으면 기본 한국어

        if (selectedVoice) {
            speech.voice = selectedVoice;
        }

        // 재생
        window.speechSynthesis.speak(speech);
    }

    // 초기 로드 시 시도
    setTimeout(setVoiceEngine, 100);
</script>

</body>
</html>
