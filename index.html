<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 실시간 스마트폰 카메라 연동 (WebRTC)</title>
    <!-- WebRTC 연결을 쉽게 해주는 PeerJS 라이브러리 로드 -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #2a2a35;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h2 { margin-top: 0; color: #4dadff; }
        .mode-selection {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        button {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-phone { background-color: #e84118; color: white; }
        .btn-pc { background-color: #00a8ff; color: white; }
        .btn-connect { background-color: #4cd137; color: white; margin-top: 10px; width: 100%; }
        button:hover { opacity: 0.9; transform: scale(0.98); }
        
        .area { display: none; margin-top: 20px; background: #13131a; padding: 20px; border-radius: 12px; }
        video { width: 100%; max-width: 100%; border-radius: 8px; background: #000; transform: scaleX(-1); } /* 좌우반전 해제하려면 transform 제거 */
        .peer-id-box {
            font-size: 18px;
            background: #333;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            word-break: break-all;
            color: #fbc531;
            font-weight: bold;
        }
        input {
            width: calc(100% - 24px);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #555;
            background: #222;
            color: white;
            font-size: 16px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎥 모바일 카메라 -> PC 실시간 연동</h2>
    <p>현재 기기가 무엇인지 선택해 주세요.</p>
    
    <div class="mode-selection">
        <button class="btn-phone" onclick="initPhone()">📱 스마트폰 (카메라 송신)</button>
        <button class="btn-pc" onclick="initPC()">💻 컴퓨터 (화면 수신)</button>
    </div>

    <!-- 1. 스마트폰 전용 영역 -->
    <div id="phone-area" class="area">
        <h3>스마트폰 카메라 방송 중</h3>
        <p>아래의 번호를 컴퓨터 화면에 입력하세요:</p>
        <div id="my-id" class="peer-id-box">연결 생성 중...</div>
        <video id="local-video" autoplay playsinline muted></video>
    </div>

    <!-- 2. 컴퓨터 전용 영역 -->
    <div id="pc-area" class="area">
        <h3>컴퓨터 수신 대기</h3>
        <p>스마트폰 화면에 적힌 번호를 입력하세요:</p>
        <input type="text" id="target-id" placeholder="스마트폰 고유 번호 입력">
        <button class="btn-connect" onclick="connectToPhone()">🔒 카메라 연결하기</button>
        <video id="remote-video" autoplay playsinline style="margin-top: 15px;"></video>
    </div>
</div>

<script>
    let peer;
    let localStream;

    // 📱 스마트폰 역할 선택 시
    function initPhone() {
        document.getElementById('phone-area').style.display = 'block';
        document.getElementById('pc-area').style.display = 'none';

        // PeerJS 객체 생성 (랜덤 ID 발급받기)
        peer = new Peer();

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id; // 컴퓨터에 입력할 ID 노출
        });

        // 스마트폰 카메라 권한 요청 및 비디오 스트림 가져오기
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment" }, // environment: 후면 카메라 (셀카는 user)
            audio: false 
        }).then(stream => {
            localStream = stream;
            document.getElementById('local-video').srcObject = stream;

            // 컴퓨터가 전화를 걸어오면(call), 내 카메라 스트림(stream)을 보내줌
            peer.on('call', (call) => {
                call.answer(localStream);
            });
        }).catch(err => {
            alert("카메라 권한을 허용해야 합니다: " + err);
        });
    }

    // 💻 컴퓨터 역할 선택 시
    function initPC() {
        document.getElementById('pc-area').style.display = 'block';
        document.getElementById('phone-area').style.display = 'none';

        peer = new Peer();
    }

    // 💻 컴퓨터에서 연결 버튼 클릭 시
    function connectToPhone() {
        const targetId = document.getElementById('target-id').value.trim();
        if (!targetId) {
            alert("스마트폰 고유 번호를 입력해 주세요.");
            return;
        }

        // 컴퓨터는 가짜 스트림을 만들어서 전화를 걸고, 스마트폰의 영상을 받아옴
        // (PeerJS 특성상 전화를 걸 때 스트림을 매개변수로 던져야 함)
        const fakeStream = new MediaStream();
        const call = peer.call(targetId, fakeStream);

        call.on('stream', (remoteStream) => {
            // 상대방(스마트폰)의 비디오 스트림을 컴퓨터 화면에 연결
            const remoteVideo = document.getElementById('remote-video');
            remoteVideo.srcObject = remoteStream;
        });
    }
</script>

</body>
</html>
