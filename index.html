<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔊 목소리 선택 가능 고품질 TTS</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a24;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #252532;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            text-align: center;
            width: 360px;
        }
        h2 { color: #00d2ff; margin-top: 0; }
        textarea {
            width: calc(100% - 24px);
            height: 90px;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #00d2ff;
            background-color: #111;
            color: white;
            font-size: 16px;
            resize: none;
            margin-bottom: 15px;
        }
        .control-group {
            margin-bottom: 15px;
            text-align: left;
            font-size: 14px;
        }
        label { display: inline-block; width: 70px; color: #aaa; }
        select {
            width: 250px;
            padding: 8px;
            border-radius: 6px;
            background: #111;
            color: white;
            border: 1px solid #555;
            font-size: 14px;
        }
        input[type="range"] { width: 240px; vertical-align: middle; }
        
        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #00d2ff;
            color: #1a1a24;
            transition: 0.2s;
        }
        button:hover { opacity: 0.9; transform: scale(0.98); }
        .status { color: #2ed573; font-size: 13px; margin-top: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔊 목소리 선택 TTS</h2>
    <textarea id="text-input">안녕하세요. 현재 연결된 음성 엔진 중에서 마음에 드는 목소리를 선택해 보세요.</textarea>
    
    <!-- 💡 목소리 선택 창 (자바스크립트가 자동으로 채워줌) -->
    <div class="control-group">
        <label>목소리 🎙️</label>
        <select id="voice-select">
            <option>엔진 로딩 중...</option>
        </select>
    </div>

    <div class="control-group">
        <label>속도(Speed)</label>
        <input type="range" id="rate" min="0.5" max="1.5" value="1" step="0.1">
    </div>
    <div class="control-group">
        <label>음높이(Pitch)</label>
        <input type="range" id="pitch" min="0.5" max="1.5" value="1" step="0.1">
    </div>

    <button onclick="speakText()">🎙️ 선택한 목소리로 말하기</button>
    <div id="status" class="status">준비 완료</div>
</div>

<script>
    const voiceSelect = document.getElementById('voice-select');
    let voices = [];

    // 기기에 내장된 전체 목소리 목록 가져와서 선택창에 뿌리기
    function loadVoices() {
        // 한국어(ko)와 영어(en) 목소리만 필터링해서 수집
        voices = window.speechSynthesis.getVoices().filter(voice => 
            voice.lang.includes('ko') || voice.lang.includes('en')
        );

        // 선택바 초기화
        voiceSelect.innerHTML = '';

        if (voices.length === 0) {
            const option = document.createElement('option');
            option.textContent = '사용 가능한 목소리가 없습니다.';
            voiceSelect.appendChild(option);
            return;
        }

        // 받아온 목소리들을 <option> 태그로 추가
        voices.forEach((voice, index) => {
            const option = document.createElement('option');
            option.value = index;
            
            // 이름 뒤에 한국어/영어 표시 달아주기
            const langName = voice.lang.includes('ko') ? ' [한국어]' : ' [영어]';
            option.textContent = voice.name + langName;
            
            // 구글 고품질(Natural/Google) 목소리가 있으면 기본값으로 선점
            if (voice.name.includes('Google') || voice.name.includes('Natural')) {
                option.selected = true;
            }
            voiceSelect.appendChild(option);
        });
    }

    // 브라우저 로딩 대기용 이벤트 설정
    if (window.speechSynthesis.onvoiceschanged !== undefined) {
        window.speechSynthesis.onvoiceschanged = loadVoices;
    }

    function speakText() {
        const text = document.getElementById('text-input').value.trim();
        if (!text) return alert("말할 내용을 입력하세요!");

        // 현재 재생 중인 소리 초기화
        window.speechSynthesis.cancel();

        const speech = new SpeechSynthesisUtterance(text);
        
        // 💡 사용자가 드롭다운에서 선택한 목소리 적용
        const selectedVoiceIndex = voiceSelect.value;
        if (voices[selectedVoiceIndex]) {
            speech.voice = voices[selectedVoiceIndex];
            speech.lang = voices[selectedVoiceIndex].lang;
        }

        // 조절바 값 적용
        speech.rate = document.getElementById('rate').value;
        speech.pitch = document.getElementById('pitch').value;

        // 출력
        window.speechSynthesis.speak(speech);
    }

    // 실행 초기 예외 방지용 강제 호출
    setTimeout(loadVoices, 100);
</script>

</body>
</html>
